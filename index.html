<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>442 Pizza Kitchen & Bar — Menu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    user-select: none;
    -webkit-user-select: none;
  }
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 720px;
  }
  .logo {
    font-size: 36px;
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 2px;
    line-height: 1;
  }
  .header-text h1 {
    font-size: 16px;
    font-weight: 500;
    color: #c9a84c;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-text p {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .badge {
    margin-left: auto;
    font-size: 11px;
    background: rgba(201,168,76,0.1);
    color: #c9a84c;
    border: 0.5px solid rgba(201,168,76,0.3);
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  #canvas-container {
    position: relative;
    background: #fff;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    max-width: 720px;
    width: 100%;
  }
  canvas { display: block; width: 100%; }
  #loading {
    position: absolute;
    inset: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #888;
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid #333;
    border-top-color: #c9a84c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 1.5rem;
  }
  .nav-btn {
    background: transparent;
    border: 0.5px solid rgba(201,168,76,0.35);
    color: #c9a84c;
    padding: 9px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: background 0.15s, opacity 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(201,168,76,0.12); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  #page-info {
    font-size: 14px;
    color: #888;
    min-width: 70px;
    text-align: center;
  }
  footer {
    margin-top: 2.5rem;
    font-size: 12px;
    color: #444;
    letter-spacing: 0.06em;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="logo">442</div>
  <div class="header-text">
    <h1>Pizza Kitchen &amp; Bar</h1>
    <p>Food Experience — Menu</p>
  </div>
</header>

<div id="canvas-container">
  <canvas id="pdf-canvas"></canvas>
  <div id="loading">
    <div class="spinner"></div>
    <span>Caricamento menu...</span>
  </div>
</div>

<nav>
  <button class="nav-btn" id="btn-prev" disabled>&#8592; Precedente</button>
  <span id="page-info">— / —</span>
  <button class="nav-btn" id="btn-next" disabled>Successiva &#8594;</button>
</nav>

<footer>Vivi l'esperienza. Scegli 442.</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function () {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = 'menu_442.pdf';
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const loading = document.getElementById('loading');
  const pageInfo = document.getElementById('page-info');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  let pdfDoc = null, pageNum = 1, rendering = false;

  function getScale() {
    const maxW = Math.min(window.innerWidth - 48, 720);
    const dpr = Math.max(window.devicePixelRatio || 1, 3);
    return { cssWidth: maxW, dpr };
  }

  function renderPage(num) {
    rendering = true;
    pdfDoc.getPage(num).then(function (page) {
      const baseVp = page.getViewport({ scale: 1 });
      const { cssWidth, dpr } = getScale();
      const scale = (cssWidth / baseVp.width) * dpr;
      const vp = page.getViewport({ scale });
      canvas.width = vp.width;
      canvas.height = vp.height;
      canvas.style.width = (vp.width / dpr) + 'px';
      canvas.style.height = (vp.height / dpr) + 'px';
      page.render({ canvasContext: ctx, viewport: vp }).promise.then(function () {
        rendering = false;
        loading.style.display = 'none';
        pageInfo.textContent = num + ' / ' + pdfDoc.numPages;
        btnPrev.disabled = num <= 1;
        btnNext.disabled = num >= pdfDoc.numPages;
      });
    });
  }

  btnPrev.addEventListener('click', function () {
    if (!rendering && pageNum > 1) { pageNum--; renderPage(pageNum); }
  });
  btnNext.addEventListener('click', function () {
    if (!rendering && pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); }
  });

  document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
  document.addEventListener('keydown', function (e) {
    if (e.ctrlKey && ['s', 'p', 'u'].includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener('resize', function () {
    if (pdfDoc) renderPage(pageNum);
  });

  pdfjsLib.getDocument(PDF_URL).promise.then(function (doc) {
    pdfDoc = doc;
    renderPage(pageNum);
  }).catch(function () {
    loading.innerHTML = '<span style="color:#c9a84c">Errore nel caricamento del PDF.</span><br><small style="color:#666;margin-top:8px">Assicurati che menu_442.pdf sia nella stessa cartella.</small>';
  });
})();
</script>
</body>
</html>
